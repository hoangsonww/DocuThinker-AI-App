# Fluent Bit — Coralogix Log Shipping
# Helm values for fluent/fluent-bit chart with Coralogix output
# Collects all K8s pod logs and ships to Coralogix with metadata enrichment

image:
  repository: fluent/fluent-bit
  tag: "2.2.2"
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

tolerations:
  - operator: Exists

priorityClassName: system-node-critical

podSecurityContext:
  fsGroup: 2000

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

serviceMonitor:
  enabled: true
  interval: 30s

env:
  - name: CORALOGIX_PRIVATE_KEY
    valueFrom:
      secretKeyRef:
        name: coralogix-credentials
        key: private-key
  - name: NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

config:
  service: |
    [SERVICE]
        Daemon        Off
        Flush         5
        Log_Level     info
        Parsers_File  /fluent-bit/etc/parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On
        storage.metrics       on
        storage.path          /var/log/flb-storage/
        storage.sync          normal
        storage.checksum      off
        storage.backlog.mem_limit 50M

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Exclude_Path      /var/log/containers/*fluent-bit*.log,/var/log/containers/*coralogix*.log
        Parser            cri
        DB                /var/log/flb_kube.db
        DB.Sync           Normal
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        Read_from_Head    False
        storage.type      filesystem

    [INPUT]
        Name              systemd
        Tag               host.*
        Systemd_Filter    _SYSTEMD_UNIT=kubelet.service
        Systemd_Filter    _SYSTEMD_UNIT=docker.service
        Systemd_Filter    _SYSTEMD_UNIT=containerd.service
        Read_From_Tail    On
        Strip_Underscores On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Trim      On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Labels              On
        Annotations         Off
        Buffer_Size         32k

    [FILTER]
        Name    modify
        Match   kube.*
        Add     cluster docuthinker-prod
        Add     environment production

    [FILTER]
        Name          nest
        Match         kube.*
        Operation     lift
        Nested_under  kubernetes
        Add_prefix    kubernetes_

    [FILTER]
        Name          grep
        Match         kube.*
        Exclude       kubernetes_container_name fluent-bit

    [FILTER]
        Name          rewrite_tag
        Match         kube.*
        Rule          $kubernetes_namespace_name ^(docuthinker-.*)$ docuthinker.$kubernetes_namespace_name.$kubernetes_container_name false
        Emitter_Name  re_emitted

    [FILTER]
        Name          modify
        Match         docuthinker.*
        Set           applicationName docuthinker
        Copy          kubernetes_namespace_name subsystemName

  outputs: |
    [OUTPUT]
        Name                 opentelemetry
        Match                *
        Host                 ingress.coralogix.com
        Port                 443
        Header               Authorization Bearer ${CORALOGIX_PRIVATE_KEY}
        Header               CX-Application-Name docuthinker
        Header               CX-Subsystem-Name kubernetes
        Logs_uri             /v1/logs
        Tls                  On
        Tls.verify           On
        Compress             gzip
        Retry_Limit          5
        net.keepalive        On
        net.keepalive_idle_timeout 30

    [OUTPUT]
        Name                 http
        Match                docuthinker.*
        Host                 ingress.coralogix.com
        Port                 443
        URI                  /logs/v1/singles
        Format               json_lines
        Header               Authorization Bearer ${CORALOGIX_PRIVATE_KEY}
        Header               Content-Type application/json
        Compress             gzip
        Tls                  On
        Tls.verify           On
        Retry_Limit          5
        Json_date_key        timestamp
        Json_date_format     iso8601
        net.keepalive        On
        net.keepalive_idle_timeout 30

  customParsers: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        syslog
        Format      regex
        Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
        Time_Key    time
        Time_Format %b %d %H:%M:%S

volumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: flb-storage
    mountPath: /var/log/flb-storage/

volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: flb-storage
    emptyDir:
      sizeLimit: 500Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "2020"
  prometheus.io/path: "/api/v1/metrics/prometheus"

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

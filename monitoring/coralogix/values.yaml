# Coralogix Kubernetes Integration
# Helm values for coralogix/coralogix-integration chart
# Deploys Fluent Bit, OTel Agent, and K8s metadata enrichment

global:
  domain: "coralogix.com"
  clusterName: "docuthinker-prod"

  defaultApplicationName: "docuthinker"
  defaultSubsystemName: "kubernetes"

  secret:
    create: false
    name: "coralogix-credentials"
    key: "private-key"

# OpenTelemetry Agent (DaemonSet for node-level collection)
opentelemetry-agent:
  enabled: true

  mode: daemonset

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  presets:
    kubernetesAttributes:
      enabled: true
      extractAllPodLabels: true
      extractAllPodAnnotations: true
    hostMetrics:
      enabled: true
    kubeletMetrics:
      enabled: true

  config:
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/*/otc-container/*.log
        start_at: beginning
        include_file_path: true
        include_file_name: false
        operators:
          - type: router
            id: get-format
            routes:
              - output: parser-docker
                expr: 'body matches "^\\{"'
              - output: parser-crio
                expr: 'body matches "^[^ Z]+ "'
              - output: parser-containerd
                expr: 'body matches "^[^ Z]+Z"'
          - type: regex_parser
            id: parser-crio
            regex: '^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout_type: gotime
              layout: '2006-01-02T15:04:05.000000000-07:00'
          - type: regex_parser
            id: parser-containerd
            regex: '^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          - type: json_parser
            id: parser-docker
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          - type: regex_parser
            id: extract_metadata_from_filepath
            regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9-]+)\/(?P<container_name>[^\/]+)\/(?P<restart_count>\d+)\.log$'
            parse_from: attributes["log.file.path"]
          - type: move
            from: attributes.log
            to: body
          - type: move
            from: attributes.stream
            to: attributes["log.iostream"]

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
        send_batch_max_size: 2048
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: version
              key: version
              from: pod
            - tag_name: component
              key: app.kubernetes.io/component
              from: pod
          annotations:
            - tag_name: commit_sha
              key: app.kubernetes.io/commit-sha
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid

      resource:
        attributes:
          - key: cx.application.name
            value: "docuthinker"
            action: upsert
          - key: cx.subsystem.name
            from_attribute: k8s.namespace.name
            action: upsert
          - key: environment
            value: "production"
            action: upsert
          - key: cluster
            value: "docuthinker-prod"
            action: upsert

      filter/health:
        logs:
          exclude:
            match_type: regexp
            bodies:
              - '.*health.*'
              - '.*readiness.*'
              - '.*liveness.*'

    exporters:
      coralogix:
        domain: "coralogix.com"
        private_key: "${CORALOGIX_PRIVATE_KEY}"
        application_name: "docuthinker"
        subsystem_name: "kubernetes"
        timeout: 30s

    service:
      pipelines:
        logs:
          receivers: [filelog]
          processors: [memory_limiter, k8sattributes, resource, filter/health, batch]
          exporters: [coralogix]
        metrics:
          receivers: [hostmetrics, kubeletstats]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [coralogix]

  tolerations:
    - operator: Exists

  priorityClassName: system-node-critical

# Cluster-level metrics collection
opentelemetry-cluster-collector:
  enabled: true

  mode: deployment
  replicaCount: 2

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  presets:
    clusterMetrics:
      enabled: true

  config:
    receivers:
      k8s_cluster:
        collection_interval: 30s
        node_conditions_to_report:
          - Ready
          - MemoryPressure
          - DiskPressure
          - PIDPressure
        allocatable_types_to_report:
          - cpu
          - memory
          - storage

      k8s_events:
        auth_type: serviceAccount
        namespaces: [docuthinker-prod, docuthinker-staging, monitoring, istio-system]

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      resource:
        attributes:
          - key: cx.application.name
            value: "docuthinker"
            action: upsert
          - key: cx.subsystem.name
            value: "kubernetes-cluster"
            action: upsert
          - key: environment
            value: "production"
            action: upsert

    exporters:
      coralogix:
        domain: "coralogix.com"
        private_key: "${CORALOGIX_PRIVATE_KEY}"
        application_name: "docuthinker"
        subsystem_name: "kubernetes-cluster"
        timeout: 30s

    service:
      pipelines:
        metrics:
          receivers: [k8s_cluster]
          processors: [memory_limiter, resource, batch]
          exporters: [coralogix]
        logs:
          receivers: [k8s_events]
          processors: [memory_limiter, resource, batch]
          exporters: [coralogix]

# Coralogix STA (Security Threat Analysis)
coralogix-sta:
  enabled: false

# ServiceMonitor for self-monitoring
serviceMonitor:
  enabled: true
  interval: 30s
  labels:
    release: prometheus

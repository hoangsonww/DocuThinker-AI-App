prometheus:
  enabled: true

  prometheusSpec:
    retention: 30d
    retentionSize: "50GB"

    # Remote Write to Coralogix for unified metrics correlation
    remoteWrite:
      - url: "https://ingress.coralogix.com/prometheus/v1"
        headers:
          Authorization: "Bearer ${CORALOGIX_PRIVATE_KEY}"
        writeRelabelConfigs:
          - sourceLabels: [__name__]
            regex: "(http_requests_total|http_request_duration_seconds_bucket|up|container_cpu_usage_seconds_total|container_memory_working_set_bytes|node_cpu_seconds_total|node_memory_MemAvailable_bytes|kube_pod_status_ready|kube_pod_container_status_restarts_total|database_connection_pool_usage|redis_memory_used_bytes|redis_commands_processed_total|sli:.*|slo:.*|backend:.*|frontend:.*)"
            action: keep
        queueConfig:
          capacity: 10000
          maxSamplesPerSend: 5000
          batchSendDeadline: 30s
          maxShards: 10
          minShards: 1
          maxRetries: 5
        metadataConfig:
          send: true
          sendInterval: 5m

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 100Gi

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 8Gi

    additionalScrapeConfigs:
      - job_name: 'docuthinker-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - docuthinker-prod
                - docuthinker-staging
                - docuthinker-dev
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: backend
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      - job_name: 'docuthinker-frontend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - docuthinker-prod
                - docuthinker-staging
                - docuthinker-dev
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: frontend
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node

alertmanager:
  enabled: true

  config:
    global:
      resolve_timeout: 5m
      slack_api_url: 'SLACK_WEBHOOK_URL'

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'
        - match:
            severity: warning
          receiver: 'warning-alerts'

    receivers:
      - name: 'default'
        slack_configs:
          - channel: '#docuthinker-alerts'
            title: 'DocuThinker Alert'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

      - name: 'critical-alerts'
        slack_configs:
          - channel: '#docuthinker-critical'
            title: 'CRITICAL: DocuThinker Alert'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        pagerduty_configs:
          - service_key: 'PAGERDUTY_SERVICE_KEY'

      - name: 'warning-alerts'
        slack_configs:
          - channel: '#docuthinker-alerts'
            title: 'Warning: DocuThinker Alert'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

grafana:
  enabled: true
  adminPassword: admin

  persistence:
    enabled: true
    size: 10Gi

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-server
          access: proxy
          isDefault: true

        - name: Loki
          type: loki
          url: http://loki:3100
          access: proxy

        - name: Coralogix
          type: prometheus
          url: https://ng-api-grpc.coralogix.com/prometheus/api/v1
          access: proxy
          isDefault: false
          jsonData:
            httpHeaderName1: "Authorization"
            timeInterval: "60s"
            queryTimeout: "120s"
            httpMethod: "POST"
          secureJsonData:
            httpHeaderValue1: "Bearer ${CORALOGIX_LOGS_QUERY_KEY}"

        - name: Coralogix Logs
          type: grafana-coralogix-logs-datasource
          url: https://ng-api-grpc.coralogix.com
          access: proxy
          jsonData:
            httpHeaderName1: "Authorization"
          secureJsonData:
            httpHeaderValue1: "Bearer ${CORALOGIX_LOGS_QUERY_KEY}"

        - name: Coralogix Traces
          type: jaeger
          url: https://ng-api-grpc.coralogix.com
          access: proxy
          jsonData:
            httpHeaderName1: "Authorization"
          secureJsonData:
            httpHeaderValue1: "Bearer ${CORALOGIX_LOGS_QUERY_KEY}"

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      docuthinker-overview:
        url: https://grafana.com/api/dashboards/12345/revisions/1/download
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 27
        datasource: Prometheus

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
